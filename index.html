<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>単月地代家賃リセット確認モーダル - モック</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Hiragino Sans', 'Hiragino Kaku Gothic ProN', Meiryo, sans-serif;
    background: #f5f6fa;
    color: #333;
  }

  /* 背景 */
  .bg-page {
    max-width: 1100px; margin: 0 auto; padding: 32px 40px;
    background: #fff; min-height: 100vh; opacity: 0.3;
  }

  /* オーバーレイ */
  .overlay {
    position: fixed; inset: 0;
    background: rgba(0,0,0,0.4);
    display: flex; align-items: center; justify-content: center;
    z-index: 1000;
  }

  /* モーダル */
  .modal {
    background: #fff; border-radius: 12px; width: 480px;
    max-height: 85vh; overflow-y: auto;
    box-shadow: 0 16px 48px rgba(0,0,0,0.2);
    padding: 24px;
  }

  /* ヘッダー */
  .modal-title {
    display: flex; justify-content: space-between; align-items: flex-start;
    margin-bottom: 20px;
  }
  .modal-title h3 { font-size: 16px; font-weight: 700; }
  .modal-title .sub { font-size: 12px; color: #888; margin-top: 4px; }
  .close-btn {
    background: none; border: none; font-size: 20px;
    color: #aaa; cursor: pointer; line-height: 1;
  }
  .close-btn:hover { color: #666; }

  /* 新デフォルト値 */
  .new-default {
    background: #f0faf7; border-radius: 8px;
    padding: 12px 16px; margin-bottom: 16px;
    display: flex; align-items: center; gap: 12px;
  }
  .new-default .label { font-size: 12px; color: #666; font-weight: 600; }
  .new-default .values { display: flex; align-items: center; gap: 8px; }
  .old-val { font-size: 14px; color: #999; text-decoration: line-through; }
  .arrow { color: #2ec4a5; font-weight: 700; }
  .new-val { font-size: 16px; font-weight: 700; color: #2ec4a5; }

  /* 説明 */
  .desc {
    font-size: 13px; color: #555; line-height: 1.6;
    margin-bottom: 16px;
  }

  /* 月別リスト */
  .month-item {
    display: flex; align-items: center; gap: 12px;
    padding: 12px; border: 1px solid #eee; border-radius: 8px;
    margin-bottom: 8px; cursor: pointer; transition: all 0.15s;
  }
  .month-item:hover { border-color: #ccc; }
  .month-item.checked { background: #f7fdfa; border-color: #2ec4a5; }

  .month-item input[type="checkbox"] { display: none; }
  .cb {
    width: 20px; height: 20px; border: 2px solid #ccc; border-radius: 5px;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0; transition: all 0.15s;
  }
  .month-item.checked .cb {
    background: #2ec4a5; border-color: #2ec4a5;
  }
  .month-item.checked .cb::after {
    content: '\2713'; color: #fff; font-size: 13px; font-weight: 700;
  }

  .month-info { flex: 1; min-width: 0; }
  .month-name { font-size: 14px; font-weight: 600; }
  .month-current { font-size: 12px; color: #888; margin-top: 2px; }

  .month-after { text-align: right; flex-shrink: 0; }
  .month-after .val { font-size: 14px; font-weight: 600; }
  .month-after .val.apply { color: #2ec4a5; }
  .month-after .val.keep { color: #999; }
  .month-after .status {
    font-size: 10px; margin-top: 2px;
    display: block;
  }
  .month-after .status.apply { color: #2ec4a5; }
  .month-after .status.keep { color: #999; }

  /* 注釈 */
  .note {
    font-size: 11px; color: #aaa; line-height: 1.5;
    margin: 12px 0 20px;
  }

  /* フッター */
  .modal-footer {
    display: flex; justify-content: flex-end; gap: 8px;
    border-top: 1px solid #eee; padding-top: 16px;
  }
  .btn {
    padding: 9px 20px; border-radius: 8px; font-size: 13px;
    font-weight: 600; cursor: pointer; border: none; transition: all 0.15s;
  }
  .btn-cancel { background: #f5f5f5; color: #666; }
  .btn-cancel:hover { background: #eee; }
  .btn-primary { background: #2ec4a5; color: #fff; }
  .btn-primary:hover { background: #27b098; }
</style>
</head>
<body>

<div class="bg-page"></div>

<div class="overlay" id="overlay">
  <div class="modal">

    <div class="modal-title">
      <div>
        <h3>単月設定の確認</h3>
        <div class="sub">個別に地代家賃が設定されている月があります</div>
      </div>
      <button class="close-btn" onclick="document.getElementById('overlay').style.display='none'">&times;</button>
    </div>

    <div class="new-default">
      <div>
        <div class="label">新しいデフォルト計算額</div>
        <div class="values">
          <span class="old-val">¥800,000</span>
          <span class="arrow">&rarr;</span>
          <span class="new-val">¥900,000</span>
        </div>
      </div>
    </div>

    <div class="desc">
      チェックした月は新デフォルト値に更新されます。<br>
      チェックを外した月は現在の設定値を維持します。
    </div>

    <!-- 月リスト -->
    <div class="month-item checked" id="row-3" onclick="toggle(3)">
      <input type="checkbox" id="cb-3" checked>
      <div class="cb"></div>
      <div class="month-info">
        <div class="month-name">3月</div>
        <div class="month-current">現在: ¥555,555</div>
      </div>
      <div class="month-after" id="after-3">
        <div class="val apply">¥900,000</div>
        <span class="status apply">新デフォルト適用</span>
      </div>
    </div>

    <div class="month-item checked" id="row-5" onclick="toggle(5)">
      <input type="checkbox" id="cb-5" checked>
      <div class="cb"></div>
      <div class="month-info">
        <div class="month-name">5月</div>
        <div class="month-current">現在: ¥750,000</div>
      </div>
      <div class="month-after" id="after-5">
        <div class="val apply">¥900,000</div>
        <span class="status apply">新デフォルト適用</span>
      </div>
    </div>

    <div class="month-item" id="row-8" onclick="toggle(8)">
      <input type="checkbox" id="cb-8">
      <div class="cb"></div>
      <div class="month-info">
        <div class="month-name">8月</div>
        <div class="month-current">現在: ¥1,200,000</div>
      </div>
      <div class="month-after" id="after-8">
        <div class="val keep">¥1,200,000</div>
        <span class="status keep">維持</span>
      </div>
    </div>

    <div class="note">
      ※ チェックした月の単月設定は削除され、賃料設定の計算値が適用されます。
    </div>

    <div class="modal-footer">
      <button class="btn btn-cancel" onclick="document.getElementById('overlay').style.display='none'">キャンセル</button>
      <button class="btn btn-primary" onclick="alert('賃料設定を更新しました')">更新する</button>
    </div>

  </div>
</div>

<script>
const currentVals = { 3: '¥555,555', 5: '¥750,000', 8: '¥1,200,000' };

function toggle(m) {
  const cb = document.getElementById('cb-' + m);
  cb.checked = !cb.checked;
  updateRow(m);
}

function updateRow(m) {
  const cb = document.getElementById('cb-' + m);
  const row = document.getElementById('row-' + m);
  const after = document.getElementById('after-' + m);

  if (cb.checked) {
    row.classList.add('checked');
    after.innerHTML = '<div class="val apply">¥900,000</div><span class="status apply">新デフォルト適用</span>';
  } else {
    row.classList.remove('checked');
    after.innerHTML = '<div class="val keep">' + currentVals[m] + '</div><span class="status keep">維持</span>';
  }
}
</script>

</body>
</html>
